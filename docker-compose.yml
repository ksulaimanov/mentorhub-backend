version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: mentorhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mentorhub
      POSTGRES_USER: mentorhub
      POSTGRES_PASSWORD: mentorhub
    ports:
      - "5432:5432"
    volumes:
      - mentorhub_pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mentorhub-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/mentorhub
      - SPRING_DATASOURCE_USERNAME=mentorhub
      - SPRING_DATASOURCE_PASSWORD=mentorhub
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      - postgres

volumes:
  mentorhub_pg_data: