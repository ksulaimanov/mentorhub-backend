server:
  port: 8080

spring:
  application:
    name: mentorhub-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/mentorhub
    username: mentorhub
    password: mentorhub

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

  web:
    cors:
      allowed-origins: http://localhost:3000,http://localhost:5173
      allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      allowed-headers: '*'
      allow-credentials: true
      max-age: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

app:
  mail:
    from: ${MAIL_FROM:no-reply@mentorhub.local}
    enabled: ${MAIL_ENABLED:true}

  jwt:
    secret: c3VwZXItc2VjdXJlLXRlc3Qta2V5LXN1cGVyLXNlY3VyZS10ZXN0LWtleQ==
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 30

  verification:
    code-expiration-minutes: 15
    resend-cooldown-seconds: 60
    max-attempts: 5

  storage:
    type: ${STORAGE_TYPE:local}
    local:
      upload-dir: uploads
      public-base-url: http://localhost:8080
      avatar-max-size-bytes: 10485760
    gcs:
      bucket-name: ${GCS_BUCKET_NAME:mentorhub-avatars}
      public-base-url: ${GCS_PUBLIC_BASE_URL:https://storage.googleapis.com/mentorhub-avatars}
      avatar-max-size-bytes: 10485760


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    enabled: ${SWAGGER_ENABLED:true}
