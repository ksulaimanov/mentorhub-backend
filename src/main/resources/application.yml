server:
  port: 8080

spring:
  application:
    name: mentorhub-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/mentorhub
    username: mentorhub
    password: mentorhub

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

app:
  jwt:
    secret: c3VwZXItc2VjdXJlLXRlc3Qta2V5LXN1cGVyLXNlY3VyZS10ZXN0LWtleQ==
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 30

  verification:
    code-expiration-minutes: 15
    resend-cooldown-seconds: 60
    max-attempts: 5

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui