server:
  port: 8080

spring:
  application:
    name: mentorhub-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/mentorhub
    username: mentorhub
    password: mentorhub

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

app:
  jwt:
    secret: change-this-in-local-env-to-a-long-secure-secret-key
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 30

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info