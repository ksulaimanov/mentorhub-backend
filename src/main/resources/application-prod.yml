server:
  port: ${PORT:8080}
  compression:
    enabled: true
    min-response-size: 1024

spring:
  application:
    name: mentorhub-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

  web:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
      allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      allowed-headers: '*'
      allow-credentials: true
      max-age: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  simple:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: WARN
    kg.kut.os.mentorhub: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

app:
  mail:
    from: ${MAIL_FROM:no-reply@mentorhub.local}
    enabled: ${MAIL_ENABLED:false}

  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 30

  verification:
    code-expiration-minutes: 15
    resend-cooldown-seconds: 60
    max-attempts: 5

  storage:
    type: ${STORAGE_TYPE:gcs}
    gcs:
      bucket-name: ${GCS_BUCKET_NAME:}
      public-base-url: ${GCS_PUBLIC_BASE_URL:}
      avatar-max-size-bytes: 10485760
    local:
      upload-dir: ${APP_STORAGE_LOCAL_UPLOAD_DIR:uploads}
      public-base-url: ${APP_STORAGE_LOCAL_PUBLIC_BASE_URL:http://localhost:8080}
      avatar-max-size-bytes: 10485760

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    enabled: ${SWAGGER_ENABLED:false}